- type: Features
  data:
  - name: RSS Feeds
    description: Site-wide and per-category RSS 2.0 feeds generated by Arc XP
      outbound feeds, updated hourly.
  - name: News Sitemap
    description: Google News sitemap exposing the most recent articles for
      crawler discovery.
  - name: Sitemap Index
    description: Sitemap index with hundreds of dated child sitemaps spanning
      roughly two years of inquirer.com URLs.
  - name: Dewey AI Librarian
    description: LLM-powered archive search assistant built on Azure OpenAI,
      Azure AI Search, and Azure Blob Storage; cites article sources.
  - name: Dewey MCP Server
    description: FastMCP server exposing a single `search_archive` tool over
      the Inquirer archive index.
  - name: Mobile Apps
    description: Native iOS and Android apps for reading Inquirer.com content.
  - name: Newsletters
    description: Topical email newsletters across news, sports, business,
      food, and opinion.
  - name: E-Edition
    description: Daily replica e-edition of the printed newspaper for
      subscribers.
  - name: Obituaries and Legal Notices
    description: Searchable obituaries and statutory legal notices sections.
- type: UseCases
  data:
  - name: News Aggregation
    description: Aggregators and readers pull Inquirer headlines and full
      article HTML via RSS feeds.
  - name: Search Engine Indexing
    description: Google News, Bing, and other crawlers consume the news
      sitemap and sitemap index for article discovery.
  - name: Local Journalism Archive Search
    description: Newsroom staff and partners search the Inquirer archive via
      the Dewey AI librarian and Dewey MCP.
  - name: AI Agent Integration
    description: AI agents that speak MCP can connect to Dewey MCP to query
      the Inquirer archive as part of larger research workflows.
  - name: Sports and Politics Syndication
    description: Per-category RSS feeds (sports, politics, business, opinion)
      power topical syndication on third-party sites.
- type: Integrations
  data:
  - name: Arc XP
    description: Inquirer.com is published on Arc Publishing (Arc XP); RSS
      and sitemap surfaces are generated by Arc's outbound feeds.
  - name: Azure AI Search
    description: Dewey indexes Inquirer articles into Azure AI Search and
      queries it via the FastMCP server.
  - name: Azure OpenAI
    description: Dewey AI uses Azure OpenAI for embeddings and chat
      completions over retrieved article chunks.
  - name: dbt
    description: The Inquirer's Data Engineering team uses dbt as a primary
      transformation tool, per the public data-engineering-handbook.
  - name: BigQuery
    description: dbt models target BigQuery as the analytics warehouse.
  - name: Spotlight PA
    description: The Inquirer is a founding member of Spotlight PA, a
      Pennsylvania investigative-journalism collaboration.
- type: Customers
  data:
  - name: Print Subscribers
    description: Approximately 32,400 average print circulation (Wikipedia).
  - name: Digital Subscribers
    description: Approximately 118,000 digital subscribers (Wikipedia).
  - name: Newsroom
    description: Approximately 225 newsroom employees as of February 2021
      (Wikipedia).
- type: Awards
  data:
  - name: Pulitzer Prizes
    description: The Philadelphia Inquirer has won 20 Pulitzer Prizes as of
