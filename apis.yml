aid: philadelphia-inquirer
name: The Philadelphia Inquirer
description: >-
  The Philadelphia Inquirer is the largest newspaper in Pennsylvania, owned by
  the nonprofit Lenfest Institute for Journalism. Inquirer.com publishes
  Philadelphia, regional, national, and world news, sports, business, opinion,
  arts, food, and obituaries. The Inquirer does not operate a public commercial
  developer program. Programmatic surfaces are limited to Arc XP-generated
  RSS feeds, news sitemaps, and a small set of open-source repositories from
  its `phillymedia` GitHub organization, including the `dewey-mcp` Model
  Context Protocol server that wraps an Azure AI Search index of the Inquirer
  archive.
type: Index
